name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ---------------------------------------------------------------------
  # Pruebas de UI con Playwright (headless) contra el demo público
  # ---------------------------------------------------------------------
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run UI test suite (BDD)
        run: pytest

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload failure evidence (videos / traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence
          path: test-results
          if-no-files-found: ignore

  # ---------------------------------------------------------------------
  # Publica el reporte Allure navegable en GitHub Pages (solo push)
  # ---------------------------------------------------------------------
  publish-report:
    name: Publish Allure report
    needs: ui-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Restore Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report (con histórico)
        run: |
          npm install -g allure-commandline
          if [ -d gh-pages/history ]; then cp -r gh-pages/history allure-results/; fi
          allure generate allure-results -o allure-report --clean

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
